# API provider configuration for the Gemma 4 e4b Autonomous Dictionary
# This dictionary uses a local model — no cloud API keys required for generation

providers:
  - id: local-gemma
    name: "Local Gemma (Ollama / llama.cpp)"
    type: local
    base_url: "http://localhost:11434"  # Ollama default; adjust if using llama.cpp
    model_id: "gemma4:e4b"
    notes: >
      Runs on local hardware. No API key needed. Ensure the model is pulled
      before running the generation pipeline: `ollama pull gemma4:e4b`

  - id: anthropic
    name: "Anthropic (consensus ratings only)"
    type: cloud
    env_var: ANTHROPIC_API_KEY
    models:
      - claude-haiku-4-5-20251001
      - claude-sonnet-4-6
    notes: >
      Used for cross-model consensus ratings only — not for generation.
      Set ANTHROPIC_API_KEY in your environment.
